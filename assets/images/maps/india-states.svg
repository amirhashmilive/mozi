<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5">
  <!-- Dynamic States with proper data-region-id attributes -->
  <!-- Rajasthan -->
  <path id="state-rajasthan" data-region-id="rajasthan" fill="rgba(239, 68, 68, 0.05)" d="M120 220 L220 200 L260 280 L180 340 L110 300 Z" />
  
  <!-- Gujarat -->
  <path id="state-gujarat" data-region-id="gujarat" fill="rgba(249, 115, 22, 0.05)" d="M80 320 L130 310 L170 350 L150 410 L70 380 Z" />
  
  <!-- Maharashtra -->
  <path id="state-maharashtra" data-region-id="maharashtra" fill="rgba(239, 68, 68, 0.05)" d="M150 415 L220 380 L310 410 L280 500 L180 470 Z" />
  
  <!-- Karnataka -->
  <path id="state-karnataka" data-region-id="karnataka" fill="rgba(59, 130, 246, 0.05)" d="M185 480 L230 490 L250 580 L190 600 Z" />
  
  <!-- Kerala -->
  <path id="state-kerala" data-region-id="kerala" fill="rgba(59, 130, 246, 0.05)" d="M190 605 L215 585 L240 650 L200 680 Z" />
  
  <!-- Delhi -->
  <path id="state-delhi" data-region-id="delhi" fill="rgba(239, 68, 68, 0.08)" d="M255 190 L280 190 L280 210 L255 210 Z" />

  <!-- Rest of India (Background structure for outline) -->
  <path d="M250 80 L320 140 L300 180 L350 220 L480 250 L520 320 L450 350 L340 450 L300 580 L270 650 L240 680 L230 650 L150 415 M120 220 L250 80" stroke-dasharray="4 4" />

  <!-- Text indicators -->
  <text x="145" y="270" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" pointer-events="none">RJ (Scorpions/Snakes)</text>
  <text x="95" y="360" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" pointer-events="none">GJ (Ticks/Rabies)</text>
  <text x="200" y="440" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" pointer-events="none">MH (Rats/Lepto)</text>
  <text x="175" y="540" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" pointer-events="none">KA (Monkey Fever)</text>
  <text x="170" y="640" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" pointer-events="none">KL (Bats/Nipah)</text>
  <text x="290" y="205" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" pointer-events="none">DL (Dengue)</text>
</svg>